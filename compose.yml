services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/diffdb
      DB_USER: diff
      DB_PASSWORD: diff
      DATA_DIR: /data
      VISUAL_DIFF_CMD: java -jar /app/visualdiff/visualdiff.jar
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: diffdb
      POSTGRES_USER: diff
      POSTGRES_PASSWORD: diff
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diff -d diffdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app_data:
  postgres_data:
